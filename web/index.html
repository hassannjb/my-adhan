<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhan Clock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/adhan@4.4.3/lib/bundles/adhan.umd.min.js"></script>
  <style>
    :root {
      --bg:      #1a1a2e;
      --surface: #16213e;
      --border:  #1e3a5f;
      --gold:    #c8a84b;
      --blue:    #5dade2;
    }

    /* ── full-height flex skeleton ── */
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: #fff;
      font-family: system-ui, sans-serif;
      padding: 5vh 10vw;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    body > div {           /* Alpine root */
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .main-row {            /* two-column row */
      flex: 1;
      min-height: 0;
      flex-wrap: nowrap !important;
      overflow: hidden;
    }
    .left-col, .right-col {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ── cards ── */
    .card {
      background: var(--surface) !important;
      border-color: var(--border) !important;
      color: #fff !important;
    }
    .card-header {
      background: transparent !important;
      border-color: var(--border) !important;
      color: #fff !important;
    }
    .card-chat { border-color: #2a5298 !important; overflow: hidden; }

    /* ── top bar ── */
    .btn-adhan { font-size: .8rem; padding: .3rem .75rem; border: none; border-radius: .3rem; color: #fff; cursor: pointer; }
    .btn-play  { background: #27ae60; }
    .btn-stop  { background: #c0392b; }
    .btn-supr  { background: #d68910; }
    .btn-gear  { background: #3d4a5a; border: none; color: #fff; font-size: 1rem; padding: .3rem .65rem; border-radius: .3rem; cursor: pointer; }
    .btn-adhan:hover, .btn-gear:hover { filter: brightness(1.2); }

    /* ── clock ── */
    .hijri-date { color: var(--gold); font-size: .95rem; }
    .greg-date  { color: #fff; font-size: .85rem; }
    .big-clock  { font-size: 3rem; font-weight: 700; letter-spacing: .04em; line-height: 1.15; color: #fff; }
    .location   { color: #fff; font-size: .85rem; margin-top: .2rem; }
    .countdown  { font-size: 3rem; font-weight: 700; color: var(--blue); line-height: 1.15; white-space: nowrap; }
    .prayer-divider { border-top: 1px solid var(--border); margin: .4rem 0; }

    /* ── prayer grid ── */
    .prayer-cell { text-align: center; padding: .5rem .2rem; }
    .prayer-name { font-size: .75rem; color: #fff; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .15rem; }
    .prayer-time { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .prayer-cell.next .prayer-name,
    .prayer-cell.next .prayer-time { color: var(--blue); }

    /* ── chat ── */
    .answer-box {
      background: #0d1b2a;
      border: 1px solid var(--border);
      border-radius: .375rem;
      padding: .75rem;
      font-size: .9rem;
      color: #fff;
      flex: 1;
      min-height: 120px;
      overflow-y: auto;
      word-break: break-word;
    }
    .answer-placeholder { color: rgba(255,255,255,.35); font-style: italic; }
    .msg-user      { color: var(--gold); margin-bottom: .35rem; white-space: pre-wrap; }
    .msg-assistant { color: #fff; margin-bottom: .9rem; padding-bottom: .75rem; border-bottom: 1px solid rgba(255,255,255,.08); white-space: pre-wrap; }
    .msg-assistant:last-child { border-bottom: none; margin-bottom: 0; }
    .msg-label     { font-size: .65rem; text-transform: uppercase; letter-spacing: .08em; opacity: .55; display: block; margin-bottom: .2rem; }

    /* ── settings panel ── */
    .settings-panel {
      position: absolute; right: 0; top: calc(100% + .5rem);
      width: 300px; z-index: 1050;
      background: #0f2030; border: 1px solid var(--border);
      border-radius: .5rem; padding: 1rem;
      box-shadow: 0 12px 40px rgba(0,0,0,.7);
      color: #fff;
    }
    .form-label { color: #fff !important; }
    .form-control, .form-select {
      background: #0a1628 !important;
      color: #fff !important;
      border-color: var(--border) !important;
      font-size: .875rem;
    }
    .form-control::placeholder { color: rgba(255,255,255,.4); }
    .form-control:focus, .form-select:focus {
      box-shadow: none !important;
      border-color: var(--blue) !important;
    }
    /* Bootstrap overrides */
    .text-secondary { color: #fff !important; }
    .text-muted     { color: #fff !important; }
    .badge.bg-secondary { background: #3d4a5a !important; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .recording { animation: pulse 1s infinite; background: #c0392b !important; }
  </style>
</head>
<body>
<div x-data="adhanApp()" x-init="init()">

  <!-- ── Top bar ── -->
  <div class="d-flex align-items-center gap-2 mb-3" style="flex-shrink:0">
    <button class="btn-adhan btn-play" @click="playAdhan()">▶ Play</button>
    <button class="btn-adhan btn-stop" @click="stopAdhan()">■ Stop</button>
    <button class="btn-adhan btn-supr" @click="suppressAdhan()">🔉 Suppress</button>

    <div class="ms-auto position-relative">
      <button class="btn-gear" @click="showSettings = !showSettings">⚙</button>

      <div class="settings-panel" x-show="showSettings" x-transition @click.outside="showSettings = false">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-semibold">Settings</span>
          <button class="btn-close btn-close-white btn-sm" @click="showSettings = false"></button>
        </div>
        <label class="form-label small">Calculation Method</label>
        <select class="form-select form-select-sm mb-3" x-model="settings.method" @change="recalculate()">
          <option value="NorthAmerica">North America</option>
          <option value="MuslimWorldLeague">Muslim World League</option>
          <option value="Egyptian">Egyptian</option>
          <option value="Karachi">Karachi</option>
          <option value="UmmAlQura">Umm Al-Qura</option>
          <option value="Dubai">Dubai</option>
          <option value="Qatar">Qatar</option>
          <option value="Kuwait">Kuwait</option>
          <option value="MoonsightingCommittee">Moonsighting Committee</option>
          <option value="Singapore">Singapore</option>
          <option value="Tehran">Tehran</option>
          <option value="Turkey">Turkey</option>
        </select>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label small">Fajr Angle</label>
            <input type="number" step="0.1" class="form-control form-control-sm"
                   x-model="settings.fajrAngle" @change="recalculate()">
          </div>
          <div class="col-6">
            <label class="form-label small">Isha Angle</label>
            <input type="number" step="0.1" class="form-control form-control-sm"
                   x-model="settings.ishaAngle" @change="recalculate()">
          </div>
        </div>
        <label class="form-label small">Adhan Sound</label>
        <select class="form-select form-select-sm" x-model="settings.audioFile">
          <option value="makkah">Makkah Adhan</option>
          <option value="fajr">Fajr Special</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── Main two-column layout ── -->
  <div class="row g-3 align-items-stretch main-row">

    <!-- LEFT: clock + prayer grid -->
    <div class="col-md-5 left-col gap-3">

      <div class="card" style="flex-shrink:0">
        <div class="card-body py-3 text-center">
          <div class="hijri-date" x-text="hijriDate"></div>
          <div class="greg-date"  x-text="currentDate"></div>
          <div class="big-clock"  x-text="currentTime"></div>
          <div class="location"   x-text="locationInfo"></div>
          <div class="prayer-divider mx-3"></div>
          <div class="countdown"  x-text="countdownText"></div>
        </div>
      </div>

      <div class="card" style="flex:1;min-height:0">
        <div class="card-body d-flex flex-column py-2 px-2" style="min-height:0">
          <div class="row row-cols-3 g-0 flex-grow-1 align-content-center">
            <template x-for="p in prayers" :key="p.name">
              <div class="col prayer-cell" :class="{ next: p.name === nextPrayerName }">
                <div class="prayer-name" x-text="p.name"></div>
                <div class="prayer-time" x-text="p.time"></div>
              </div>
            </template>
          </div>
        </div>
      </div>

    </div><!-- /left -->

    <!-- RIGHT: chat -->
    <div class="col-md-7 right-col">
      <div class="card card-chat d-flex flex-column" style="flex:1;min-height:0">

        <div class="card-header py-2 px-3">
          <div class="fw-semibold" style="font-size:1rem">Ask a Question</div>
          <div style="font-size:.8rem;margin-top:.15rem">
            Prayer times for any city &middot; Islamic practices &middot; App help &middot; Answers in your chosen language
          </div>
        </div>

        <div class="card-body d-flex flex-column gap-2 py-2 px-3" style="min-height:0">

          <!-- Language + RAG status -->
          <div class="d-flex align-items-center gap-2" style="flex-shrink:0">
            <span style="white-space:nowrap;font-size:.875rem">Language</span>
            <select class="form-select form-select-sm" x-model="chatLang"
                    @change="updatePlaceholder()" style="max-width:130px">
              <option>English</option>
              <option>Urdu</option>
              <option>Hindi</option>
              <option>Turkish</option>
              <option>Arabic</option>
            </select>
            <div class="ms-auto d-flex align-items-center gap-1">
              <span style="font-size:.8rem">RAG</span>
              <span class="badge rounded-pill"
                    :class="ragReady ? 'bg-success' : 'bg-secondary'"
                    :title="ragError || 'Claude RAG ready'"
                    x-text="ragReady ? 'Ready' : 'Offline'"></span>
            </div>
          </div>

          <!-- Input + mic + ask -->
          <div class="input-group" style="flex-shrink:0">
            <input type="text" class="form-control form-control-sm"
                   x-model="question"
                   :placeholder="inputPlaceholder"
                   @keyup.enter="askQuestion()"
                   :disabled="chatLoading">
            <button class="btn btn-sm btn-secondary"
                    :class="{ recording: recognizing }"
                    @click="toggleVoice()"
                    title="Voice input">🎤</button>
            <button class="btn btn-sm btn-primary"
                    @click="askQuestion()"
                    :disabled="chatLoading">
              <span x-show="!chatLoading">Ask</span>
              <span x-show="chatLoading">…</span>
            </button>
          </div>

          <!-- Conversation label + controls -->
          <div class="d-flex justify-content-between align-items-center" style="flex-shrink:0">
            <span style="font-size:.85rem">Conversation</span>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-light py-0 px-2"
                      style="font-size:.75rem"
                      @click="speakAnswer()"
                      :disabled="!messages.length">🔊 Speak</button>
              <button class="btn btn-sm btn-outline-secondary py-0 px-2"
                      style="font-size:.75rem"
                      @click="newChat()"
                      title="Clear conversation and start fresh">↺ New Chat</button>
            </div>
          </div>

          <!-- Conversation thread — fills remaining height -->
          <div class="answer-box">
            <span x-show="messages.length === 0 && !chatLoading" class="answer-placeholder">Answer will appear here…</span>
            <template x-for="(msg, i) in messages" :key="i">
              <div :class="'msg-' + msg.role">
                <span class="msg-label" x-text="msg.role === 'user' ? 'You' : 'Assistant'"></span>
                <span x-text="msg.content"></span>
              </div>
            </template>
            <!-- Live streaming bubble -->
            <div x-show="chatLoading" class="msg-assistant">
              <span class="msg-label">Assistant</span>
              <span x-text="streamingContent || '…'"></span>
            </div>
          </div>

        </div>
      </div>
    </div><!-- /right -->

  </div><!-- /main-row -->
</div>

<audio id="makkahAudio" src="/audio/makkah_adhan.mp3" preload="auto"></audio>
<audio id="fajrAudio"   src="/audio/fajr.mp3"         preload="auto"></audio>
<script src="app.js"></script>
</body>
</html>
